<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Şok Nokta">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230f172a' width='100' height='100' rx='20'/><text x='50' y='65' text-anchor='middle' font-size='50'>⚡</text></svg>">
<title>Şok Nokta - Maliyet</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 12px; padding-bottom: 80px; }
.header { text-align: center; padding: 12px 0 8px; }
.header h1 { font-size: 18px; color: #60a5fa; }
.header small { color: #64748b; font-size: 11px; }

.card { background: #1e293b; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.card-title { font-size: 13px; color: #94a3b8; margin-bottom: 10px; font-weight: 600; }

.kur-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.kur-grid.uc { grid-template-columns: 1fr 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field label { font-size: 11px; color: #64748b; }
.field input { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px; color: #e2e8f0; font-size: 16px; text-align: center; width: 100%; -webkit-appearance: none; }
.field input:focus { outline: none; border-color: #3b82f6; }

.urun-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 8px; }
.urun-row .field { flex: 1; }
.btn-ekle { background: #3b82f6; border: none; color: white; border-radius: 8px; padding: 10px 14px; font-size: 20px; cursor: pointer; white-space: nowrap; min-width: 44px; }
.btn-ekle:active { background: #2563eb; }

.gram-toggle { display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 1px solid #334155; margin-bottom: 8px; }
.gram-toggle input { display: none; }
.gram-toggle label { flex: 1; text-align: center; padding: 8px; font-size: 13px; color: #94a3b8; background: #0f172a; cursor: pointer; transition: all 0.2s; }
.gram-toggle input:checked + label { background: #3b82f6; color: white; font-weight: 600; }

.urun-list { margin-top: 8px; }
.urun-item { background: #0f172a; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; position: relative; }
.urun-item .urun-no { font-size: 11px; color: #64748b; margin-bottom: 4px; }
.urun-item .urun-info { font-size: 14px; color: #cbd5e1; margin-bottom: 8px; }
.urun-item .urun-info b { color: #e2e8f0; }
.btn-sil { position: absolute; top: 8px; right: 10px; background: none; border: none; color: #64748b; font-size: 18px; cursor: pointer; padding: 2px 6px; }
.btn-sil:active { color: #ef4444; }

.section-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin: 6px 0 4px 2px; font-weight: 600; }

.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
.box { border-radius: 6px; padding: 6px 4px; text-align: center; }
.box .lbl { font-size: 9px; color: #94a3b8; }
.box .val { font-size: 13px; font-weight: 700; }

.bg-dark { background: #1e293b; }
.bg-mid { background: #334155; }

.c-z { color: #f59e0b; }
.c-n { color: #a78bfa; }
.c-s { color: #34d399; }
.c-pct { color: #fb923c; }
.c-brut { color: #60a5fa; }
.c-satis { color: #fbbf24; }
.c-ort { color: #f472b6; font-weight: 800; }

.ozet { text-align: center; margin-top: 8px; }
.ozet span { font-size: 12px; color: #94a3b8; }
.ozet b { color: #60a5fa; }

.actions-bar { display: flex; gap: 8px; margin-top: 10px; }
.btn-temizle { flex: 1; background: #991b1b; border: none; color: white; border-radius: 8px; padding: 10px; font-size: 13px; cursor: pointer; }
.btn-temizle:active { background: #7f1d1d; }

.ayar-toggle { text-align: center; margin-bottom: 6px; }
.ayar-toggle button { background: none; border: none; color: #64748b; font-size: 12px; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
    <h1>Şok Nokta Maliyet</h1>
    <small>Hızlı maliyet hesaplayıcı</small>
</div>

<div class="ayar-toggle">
    <button onclick="toggleKur()">⚙ Kurları Düzenle</button>
</div>

<div class="card" id="kurCard" style="display:none">
    <div class="card-title">Döviz Kurları</div>
    <div class="kur-grid">
        <div class="field"><label>RMB Kuru</label><input type="number" id="rnb" value="6.60" step="0.01" inputmode="decimal" onchange="kurKaydet()"></div>
        <div class="field"><label>USD Kuru</label><input type="number" id="usd" value="45.00" step="0.01" inputmode="decimal" onchange="kurKaydet()"></div>
    </div>
    <div style="height:8px"></div>
    <div class="card-title">Nakliye ($/ton)</div>
    <div class="kur-grid uc">
        <div class="field"><label>Zirve</label><input type="number" id="zNak" value="52" step="0.5" inputmode="decimal" onchange="kurKaydet()"></div>
        <div class="field"><label>Neyma</label><input type="number" id="nNak" value="42" step="0.5" inputmode="decimal" onchange="kurKaydet()"></div>
        <div class="field"><label>Serkan</label><input type="number" id="sNak" value="48" step="0.5" inputmode="decimal" onchange="kurKaydet()"></div>
    </div>
</div>

<div class="card">
    <div class="card-title">Ürün Ekle</div>
    <div class="gram-toggle">
        <input type="radio" name="gramTipi" id="gramTane" value="1" checked>
        <label for="gramTane">Tane</label>
        <input type="radio" name="gramTipi" id="gramDuzine" value="12">
        <label for="gramDuzine">Düzine</label>
    </div>
    <div class="urun-row">
        <div class="field"><label>Gram</label><input type="number" id="gramInput" inputmode="decimal" placeholder="250"></div>
        <div class="field"><label>Fiyat (RMB)</label><input type="number" id="fiyatInput" inputmode="decimal" placeholder="12.5"></div>
        <button class="btn-ekle" onclick="ekle()">+</button>
    </div>
</div>

<div id="urunList" class="urun-list"></div>

<div class="ozet" id="ozet" style="display:none">
    <span>Toplam <b id="ozetAdet">0</b> ürün</span>
</div>

<div class="actions-bar" id="actionsBar" style="display:none">
    <button class="btn-temizle" onclick="temizle()">🗑 Tümünü Temizle</button>
</div>

<script>
var urunler = [];

var _kurFields = ['rnb','usd','zNak','nNak','sNak'];
function kurKaydet() {
    var obj = {};
    for (var i = 0; i < _kurFields.length; i++) obj[_kurFields[i]] = document.getElementById(_kurFields[i]).value;
    localStorage.setItem('smh_kurlar', JSON.stringify(obj));
    render();
}
function kurYukle() {
    try {
        var obj = JSON.parse(localStorage.getItem('smh_kurlar'));
        if (!obj) return;
        for (var i = 0; i < _kurFields.length; i++) {
            if (obj[_kurFields[i]] !== undefined) document.getElementById(_kurFields[i]).value = obj[_kurFields[i]];
        }
    } catch(e) {}
}
kurYukle();

function toggleKur() {
    var c = document.getElementById('kurCard');
    c.style.display = c.style.display === 'none' ? 'block' : 'none';
}

function hesapla(gram, fiyat) {
    var rnb = parseFloat(document.getElementById('rnb').value) || 0;
    var usd = parseFloat(document.getElementById('usd').value) || 0;
    var zN = parseFloat(document.getElementById('zNak').value) || 0;
    var nN = parseFloat(document.getElementById('nNak').value) || 0;
    var sN = parseFloat(document.getElementById('sNak').value) || 0;

    var gramBolen = document.querySelector('input[name="gramTipi"]:checked').value == '12' ? 12 : 1;
    var g = gram / gramBolen;
    var mZ = (fiyat * 1.05 * rnb) + (g * 1.1 * (zN / 1000) * usd);
    var mN = (fiyat * 1.05 * rnb) + (g * 1.1 * (nN / 1000) * usd);
    var mS = (fiyat * 1.05 * rnb) + (g * 1.1 * (sN / 1000) * usd);

    var farkZN = (mZ - mN) / mZ;
    var farkSN = (mS - mN) / mS;
    var farkZS = (mZ - mS) / mZ;

    var bZ = mZ * 2;
    var bN = mN * 2;
    var bS = mS * 2;
    var ortGuclu = (bZ + bN + bS) / 3;

    var sZ = mZ * 1.6;
    var sN2 = mN * 1.6;
    var sS = mS * 1.6;
    var ortFiyat = (sZ + sN2 + sS) / 3;

    return {
        mZ: mZ, mN: mN, mS: mS,
        farkZN: farkZN, farkSN: farkSN, farkZS: farkZS,
        bZ: bZ, bN: bN, bS: bS, ortGuclu: ortGuclu,
        sZ: sZ, sN: sN2, sS: sS, ortFiyat: ortFiyat
    };
}

function ekle() {
    var gram = parseFloat(document.getElementById('gramInput').value);
    var fiyat = parseFloat(document.getElementById('fiyatInput').value);
    if (!gram || !fiyat) { alert('Gram ve fiyat girin.'); return; }

    urunler.push({ gram: gram, fiyat: fiyat });
    document.getElementById('gramInput').value = '';
    document.getElementById('fiyatInput').value = '';
    document.getElementById('gramInput').focus();
    render();
}

function sil(idx) {
    urunler.splice(idx, 1);
    render();
}

function temizle() {
    urunler = [];
    render();
}

function f(n) { return n.toFixed(2); }
function pct(n) { return (n * 100).toFixed(1) + '%'; }

function render() {
    var list = document.getElementById('urunList');
    var html = '';
    for (var i = 0; i < urunler.length; i++) {
        var u = urunler[i];
        var h = hesapla(u.gram, u.fiyat);
        html += '<div class="urun-item">';
        html += '<button class="btn-sil" onclick="sil('+i+')">×</button>';
        html += '<div class="urun-no">#' + (i+1) + '</div>';
        html += '<div class="urun-info"><b>' + u.gram + 'g</b> · <b>' + u.fiyat + ' ¥</b></div>';

        html += '<div class="row3">';
        html += '<div class="box bg-mid"><div class="lbl">B.Serkan</div><div class="val c-s">₺' + f(h.bS) + '</div></div>';
        html += '<div class="box bg-mid"><div class="lbl">B.Zirve</div><div class="val c-z">₺' + f(h.bZ) + '</div></div>';
        html += '<div class="box bg-mid"><div class="lbl">B.Neyma</div><div class="val c-n">₺' + f(h.bN) + '</div></div>';
        html += '</div>';
        html += '<div class="row3" style="margin-top:4px">';
        html += '<div class="box bg-mid" style="grid-column:1/-1"><div class="lbl">Ort. Güçlü</div><div class="val c-ort">₺' + f(h.ortGuclu) + '</div></div>';
        html += '</div>';

        html += '</div>';
    }
    list.innerHTML = html;

    var show = urunler.length > 0;
    document.getElementById('ozet').style.display = show ? 'block' : 'none';
    document.getElementById('actionsBar').style.display = show ? 'flex' : 'none';
    document.getElementById('ozetAdet').textContent = urunler.length;
}

document.getElementById('fiyatInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') ekle();
});
document.querySelectorAll('input[name="gramTipi"]').forEach(function(r) { r.addEventListener('change', render); });
document.getElementById('gramInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('fiyatInput').focus();
});
</script>
</body>
</html>
