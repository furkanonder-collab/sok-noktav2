<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Şok Nokta">
<meta name="theme-color" content="#0b1120">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230b1120' width='100' height='100' rx='20'/><text x='50' y='68' text-anchor='middle' font-size='52'>⚡</text></svg>">
<title>Şok Nokta - Maliyet</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b 0%, #0b1120 55%) fixed, #0b1120;
    color: #e2e8f0; min-height: 100vh; padding: 0 14px 96px;
}

.header { text-align: center; padding: 20px 0 12px; }
.logo { width: 44px; height: 44px; border-radius: 13px; background: linear-gradient(135deg,#3b82f6,#8b5cf6); display: inline-flex; align-items: center; justify-content: center; font-size: 23px; box-shadow: 0 8px 24px rgba(59,130,246,0.35); margin-bottom: 6px; }
.header h1 { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; }
.header small { color: #64748b; font-size: 12px; }

.card { background: rgba(30,41,59,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(148,163,184,0.1); border-radius: 18px; padding: 16px; margin-bottom: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.25); }
.card-title { font-size: 12px; color: #94a3b8; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }

.ayar-toggle { text-align: center; margin: 2px 0 12px; }
.ayar-toggle button { background: rgba(148,163,184,0.1); border: 1px solid rgba(148,163,184,0.15); color: #94a3b8; font-size: 12.5px; cursor: pointer; padding: 7px 16px; border-radius: 999px; transition: all 0.2s; }
.ayar-toggle button:active { background: rgba(148,163,184,0.2); }

.kur-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.kur-grid.uc { grid-template-columns: 1fr 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; color: #64748b; font-weight: 600; padding-left: 2px; }
.field input {
    background: #0b1120; border: 1.5px solid #1e293b; border-radius: 12px; padding: 13px;
    color: #f1f5f9; font-size: 17px; text-align: center; width: 100%; -webkit-appearance: none;
    transition: border-color 0.2s, box-shadow 0.2s; font-weight: 600;
}
.field input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
.field input::placeholder { color: #475569; font-weight: 400; }

.gram-toggle { display: flex; gap: 4px; background: #0b1120; padding: 4px; border-radius: 12px; border: 1.5px solid #1e293b; margin-bottom: 12px; }
.gram-toggle input { display: none; }
.gram-toggle label { flex: 1; text-align: center; padding: 10px; font-size: 14px; color: #94a3b8; border-radius: 9px; cursor: pointer; transition: all 0.2s; font-weight: 600; }
.gram-toggle input:checked + label { background: linear-gradient(135deg,#3b82f6,#6366f1); color: white; box-shadow: 0 4px 12px rgba(59,130,246,0.35); }

.urun-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.main-result { background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.12)); border: 1px solid rgba(99,102,241,0.25); border-radius: 14px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.main-result .lbl { font-size: 12px; color: #a5b4fc; font-weight: 600; }
.main-result .val { font-size: 24px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }

.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.box { background: rgba(51,65,85,0.5); border-radius: 12px; padding: 9px 4px; text-align: center; }
.box .lbl { font-size: 10px; color: #94a3b8; font-weight: 600; margin-bottom: 2px; }
.box .val { font-size: 14px; font-weight: 700; }
.c-z { color: #fbbf24; }
.c-n { color: #a78bfa; }
.c-s { color: #34d399; }

/* Önizleme foto + adet + sipariş ver */
.giris-alt { display: flex; gap: 10px; align-items: center; margin: 14px 0 12px; }
.foto-ekle { width: 52px; height: 52px; border-radius: 11px; border: 1.5px dashed #334155; background: #0b1120; color: #64748b; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; padding: 0; }
.foto-ekle:active { background: #1e293b; }
.urun-foto { width: 52px; height: 52px; border-radius: 11px; object-fit: cover; cursor: pointer; flex-shrink: 0; border: 1px solid rgba(148,163,184,0.15); }
.adet-input { flex: 1; }
.adet-input input { background: #0b1120; border: 1.5px solid #1e293b; border-radius: 12px; padding: 13px; color: #f1f5f9; font-size: 16px; text-align: center; width: 100%; font-weight: 700; -webkit-appearance: none; }
.adet-input input:focus { outline: none; border-color: #34d399; }
.adet-input input::placeholder { color: #475569; font-weight: 400; }
.btn-siparis { width: 100%; background: linear-gradient(135deg,#10b981,#059669); border: none; color: white; border-radius: 12px; padding: 15px; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 6px 16px rgba(16,185,129,0.35); transition: transform 0.1s; }
.btn-siparis:active { transform: scale(0.98); }

/* Fiş (sepet) ürün kartı */
.urun-list { margin-top: 4px; }
.urun-item { background: rgba(15,23,42,0.85); border: 1px solid rgba(148,163,184,0.08); border-radius: 16px; padding: 14px; margin-bottom: 12px; position: relative; animation: slideIn 0.25s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.urun-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.urun-badge { background: linear-gradient(135deg,#3b82f6,#6366f1); color: white; font-size: 12px; font-weight: 700; width: 24px; height: 24px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.urun-info { font-size: 14px; color: #cbd5e1; }
.urun-info b { color: #f1f5f9; font-weight: 700; }
.btn-sil { margin-left: auto; background: rgba(239,68,68,0.12); border: none; color: #f87171; font-size: 15px; cursor: pointer; width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; }
.btn-sil:active { background: rgba(239,68,68,0.28); }
.kart-adet-row { display: flex; align-items: center; gap: 10px; }
.kart-adet { width: 92px; flex-shrink: 0; }
.kart-adet input { background: #0b1120; border: 1.5px solid #1e293b; border-radius: 10px; padding: 10px; color: #f1f5f9; font-size: 15px; text-align: center; width: 100%; font-weight: 700; -webkit-appearance: none; }
.kart-adet input:focus { outline: none; border-color: #34d399; }
.toplam-kutu { flex: 1; background: rgba(52,211,153,0.1); border-radius: 10px; padding: 9px 12px; display: flex; align-items: center; justify-content: space-between; }
.toplam-kutu .lbl { font-size: 11px; color: #6ee7b7; font-weight: 600; }
.toplam-kutu .val { font-size: 17px; font-weight: 800; color: #34d399; }
.satis-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding: 9px 12px; background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.22); border-radius: 10px; font-size: 12px; color: #c4b5fd; }
.satis-row b { color: #f1f5f9; font-size: 14px; font-weight: 700; }

.empty { text-align: center; padding: 40px 20px; color: #475569; }
.empty .ico { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }
.empty p { font-size: 13px; line-height: 1.5; }

.genel-toplam { background: linear-gradient(135deg, rgba(52,211,153,0.15), rgba(16,185,129,0.1)); border: 1px solid rgba(52,211,153,0.3); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.genel-toplam .lbl { font-size: 13px; color: #6ee7b7; font-weight: 700; }
.genel-toplam .val { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
.toplam5 { background: linear-gradient(135deg, rgba(52,211,153,0.15), rgba(16,185,129,0.1)); border: 1px solid rgba(52,211,153,0.3); border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; }
.toplam5 .r1 { display: flex; justify-content: space-between; align-items: center; }
.toplam5 .r2 { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(148,163,184,0.25); }
.toplam5 .l1 { font-size: 13px; color: #6ee7b7; font-weight: 700; }
.toplam5 .v1 { font-size: 21px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
.toplam5 .l2 { font-size: 12px; color: #fcd34d; font-weight: 700; }
.toplam5 .v2 { font-size: 18px; font-weight: 800; color: #fcd34d; }
.toplam5 .usd { font-size: 0.6em; font-weight: 700; margin-left: 4px; }

.btn-fis { width: 100%; background: linear-gradient(135deg,#3b82f6,#6366f1); border: none; color: white; border-radius: 12px; padding: 15px; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 6px 16px rgba(59,130,246,0.35); transition: transform 0.1s; margin-bottom: 8px; }
.btn-fis:active { transform: scale(0.98); }
.btn-temizle { width: 100%; background: transparent; border: none; color: #64748b; border-radius: 12px; padding: 8px; font-size: 12.5px; font-weight: 600; cursor: pointer; text-decoration: underline; }
.btn-yedek { flex: 1; background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: #93c5fd; border-radius: 10px; padding: 11px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-yedek:active { background: rgba(59,130,246,0.28); }

/* Fiş kartı (Siparişler) */
.fis-card { background: rgba(15,23,42,0.85); border: 1px solid rgba(148,163,184,0.1); border-radius: 16px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: transform 0.1s; }
.fis-card:active { transform: scale(0.98); }
.fis-ust { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.fis-ad { font-size: 15px; font-weight: 700; color: #f1f5f9; }
.fis-tarih { font-size: 11px; color: #64748b; }
.fis-alt { display: flex; align-items: center; justify-content: space-between; }
.fis-alt .adet { font-size: 12px; color: #94a3b8; }
.fis-toplam { font-size: 18px; font-weight: 800; color: #34d399; }

.btn-geri { background: rgba(148,163,184,0.1); border: none; color: #94a3b8; font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 999px; cursor: pointer; margin-bottom: 12px; }
.fis-baslik { margin-bottom: 14px; }
.fis-baslik h2 { font-size: 20px; font-weight: 700; }
.fis-baslik small { color: #64748b; font-size: 12px; }
.btn-fissil { width: 100%; background: rgba(153,27,27,0.15); border: 1px solid rgba(239,68,68,0.2); color: #f87171; border-radius: 12px; padding: 12px; font-size: 13.5px; font-weight: 600; cursor: pointer; margin-top: 4px; }

/* Alt sekme çubuğu */
.tabbar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: rgba(11,17,32,0.96); backdrop-filter: blur(10px); border-top: 1px solid rgba(148,163,184,0.12); padding: 6px 0 calc(6px + env(safe-area-inset-bottom)); z-index: 50; }
.tabbar button { flex: 1; background: none; border: none; color: #64748b; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px; }
.tabbar button .ico { font-size: 21px; }
.tabbar button.aktif { color: #60a5fa; }
.tab-rozet { background: #34d399; color: #0b1120; font-size: 9px; font-weight: 800; border-radius: 999px; padding: 1px 6px; margin-left: 3px; }

/* Büyük foto */
.foto-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.foto-modal.acik { display: flex; }
.foto-modal img { max-width: 100%; max-height: 90vh; border-radius: 12px; }
</style>
</head>
<body>

<div class="header">
    <div class="logo">⚡</div>
    <h1>Şok Nokta</h1>
    <small>Sipariş maliyet hesaplayıcı</small>
</div>

<!-- ============ ÜRÜN EKLE ============ -->
<div id="view-urun">
    <div class="ayar-toggle">
        <button onclick="toggleKur()">⚙️ Kur, Nakliye & Yedek</button>
    </div>

    <div class="card" id="kurCard" style="display:none">
        <div class="card-title">💱 Döviz Kurları</div>
        <div class="kur-grid">
            <div class="field"><label>RMB Kuru</label><input type="number" id="rnb" value="6.60" step="0.01" inputmode="decimal" onchange="kurKaydet()"></div>
            <div class="field"><label>USD Kuru</label><input type="number" id="usd" value="45.00" step="0.01" inputmode="decimal" onchange="kurKaydet()"></div>
        </div>
        <div class="card-title" style="margin-top:16px">🚚 Nakliye ($/ton)</div>
        <div class="kur-grid uc">
            <div class="field"><label>Z</label><input type="number" id="zNak" value="52" step="0.5" inputmode="decimal" onchange="kurKaydet()"></div>
            <div class="field"><label>N</label><input type="number" id="nNak" value="42" step="0.5" inputmode="decimal" onchange="kurKaydet()"></div>
            <div class="field"><label>S</label><input type="number" id="sNak" value="48" step="0.5" inputmode="decimal" onchange="kurKaydet()"></div>
        </div>
        <div class="card-title" style="margin-top:16px">💾 Yedek (Drive'a kaydet)</div>
        <div style="display:flex;gap:8px">
            <button class="btn-yedek" onclick="yedekAl()">⬇️ Yedek Al</button>
            <button class="btn-yedek" onclick="document.getElementById('yedekInput').click()">⬆️ Geri Yükle</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">➕ Ürün Fiyatı</div>
        <div class="gram-toggle">
            <input type="radio" name="gramTipi" id="gramTane" value="1" checked>
            <label for="gramTane">Tane</label>
            <input type="radio" name="gramTipi" id="gramDuzine" value="12">
            <label for="gramDuzine">Düzine</label>
        </div>
        <div class="urun-row2">
            <div class="field"><label>Gram</label><input type="number" id="gramInput" inputmode="decimal" placeholder="250"></div>
            <div class="field"><label>Fiyat (¥)</label><input type="number" id="fiyatInput" inputmode="decimal" placeholder="12.5"></div>
        </div>
    </div>

    <div class="card" id="onizleme" style="display:none">
        <div class="card-title">💰 Maliyet & Sipariş</div>
        <div class="main-result"><span class="lbl">Birim Fiyat</span><span class="val" id="onBirim">₺0</span></div>
        <div class="row3">
            <div class="box"><div class="lbl">S</div><div class="val c-s" id="onS">₺0</div></div>
            <div class="box"><div class="lbl">Z</div><div class="val c-z" id="onZ">₺0</div></div>
            <div class="box"><div class="lbl">N</div><div class="val c-n" id="onN">₺0</div></div>
        </div>
        <div class="giris-alt">
            <div id="onFotoWrap"><button class="foto-ekle" onclick="fotoGirisSec()">📷</button></div>
            <div class="adet-input"><input type="number" id="onAdet" inputmode="numeric" placeholder="Adet"></div>
        </div>
        <button class="btn-siparis" onclick="siparisVer()">🛒 Sipariş Ver</button>
    </div>
</div>

<!-- ============ FİŞ (SEPET) ============ -->
<div id="view-fis" style="display:none">
    <div id="fisUrunList" class="urun-list"></div>
    <div class="toplam5" id="fisToplamKutu" style="display:none"></div>
    <div id="fisActions" style="display:none">
        <button class="btn-fis" onclick="fisKaydet()">🧾 Fişi Kaydet (Siparişlere Ekle)</button>
        <button class="btn-temizle" onclick="temizle()">Fişi temizle</button>
    </div>
</div>

<!-- ============ SİPARİŞLER ============ -->
<div id="view-siparisler" style="display:none">
    <div id="fislerList"></div>
    <div id="fisDetay" style="display:none"></div>
</div>

<!-- Alt sekme çubuğu -->
<nav class="tabbar">
    <button id="tab-urun" class="aktif" onclick="tabGoster('urun')"><span class="ico">➕</span><span>Ürün Ekle</span></button>
    <button id="tab-fis" onclick="tabGoster('fis')"><span class="ico">🧾</span><span id="tabFisEt">Fiş</span></button>
    <button id="tab-siparisler" onclick="tabGoster('siparisler')"><span class="ico">📋</span><span id="tabSiparisEt">Siparişler</span></button>
</nav>

<input type="file" accept="image/*" id="fotoInput" style="display:none" onchange="fotoYuklendi(this)">
<input type="file" accept=".json,application/json" id="yedekInput" style="display:none" onchange="geriYukle(this)">

<div class="foto-modal" id="fotoModal" onclick="this.classList.remove('acik')">
    <img id="fotoModalImg" src="">
</div>

<script>
var urunler = [];   // mevcut fiş (sepet)
var fisler = [];    // kayıtlı fişler
var _girisFoto = null;  // önizlemedeki ürünün fotoğrafı

/* ---------- localStorage ---------- */
var _kurFields = ['rnb','usd','zNak','nNak','sNak'];
function kurKaydet() {
    try {
        var obj = {};
        for (var i = 0; i < _kurFields.length; i++) obj[_kurFields[i]] = document.getElementById(_kurFields[i]).value;
        localStorage.setItem('smh_kurlar', JSON.stringify(obj));
    } catch(e) {}
    onGirisDegis();
    renderFis();
}
function kurYukle() {
    try {
        var obj = JSON.parse(localStorage.getItem('smh_kurlar'));
        if (!obj) return;
        for (var i = 0; i < _kurFields.length; i++) {
            if (obj[_kurFields[i]] !== undefined) document.getElementById(_kurFields[i]).value = obj[_kurFields[i]];
        }
    } catch(e) {}
}
function urunlerKaydet() {
    try { localStorage.setItem('smh_urunler', JSON.stringify(urunler)); }
    catch(e) { alert('Depolama alanı dolmuş olabilir. Bazı ürünleri veya fotoğrafları silin.'); }
}
function urunlerYukle() {
    try { var a = JSON.parse(localStorage.getItem('smh_urunler')); if (Array.isArray(a)) urunler = a; } catch(e) {}
}
function fislerKaydet() {
    try { localStorage.setItem('smh_fisler', JSON.stringify(fisler)); }
    catch(e) { alert('Depolama alanı dolmuş olabilir. Eski fişleri veya fotoğrafları silin.'); }
}
function fislerYukle() {
    try { var a = JSON.parse(localStorage.getItem('smh_fisler')); if (Array.isArray(a)) fisler = a; } catch(e) {}
}

kurYukle();
urunlerYukle();
fislerYukle();

function toggleKur() {
    var c = document.getElementById('kurCard');
    c.style.display = c.style.display === 'none' ? 'block' : 'none';
}

/* ---------- Yedek (dışa / içe aktar) ---------- */
function kurlarRaw() {
    var o = {};
    for (var i = 0; i < _kurFields.length; i++) o[_kurFields[i]] = document.getElementById(_kurFields[i]).value;
    return o;
}
function yedekAl() {
    var veri = { v: 1, tarih: new Date().toISOString(), kurlar: kurlarRaw(), urunler: urunler, fisler: fisler };
    var blob = new Blob([JSON.stringify(veri)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'sok-nokta-yedek-' + new Date().toLocaleDateString('tr-TR').replace(/[.\/]/g, '-') + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1500);
}
function geriYukle(input) {
    if (!input.files || !input.files[0]) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        var veri;
        try { veri = JSON.parse(e.target.result); }
        catch(err) { alert('Dosya okunamadı. Geçerli bir yedek dosyası seçin.'); input.value = ''; return; }
        if (!confirm('Yedek geri yüklenecek. Mevcut ürün, fiş ve kurların bununla DEĞİŞECEK. Devam edilsin mi?')) { input.value = ''; return; }
        try {
            if (veri.kurlar) {
                for (var i = 0; i < _kurFields.length; i++) {
                    if (veri.kurlar[_kurFields[i]] !== undefined) document.getElementById(_kurFields[i]).value = veri.kurlar[_kurFields[i]];
                }
                localStorage.setItem('smh_kurlar', JSON.stringify(kurlarRaw()));
            }
            urunler = Array.isArray(veri.urunler) ? veri.urunler : [];
            fisler = Array.isArray(veri.fisler) ? veri.fisler : [];
            urunlerKaydet(); fislerKaydet();
            onGirisDegis(); renderFis(); tabRozetGuncelle();
            alert('✅ Yedek geri yüklendi.\n' + fisler.length + ' kayıtlı sipariş, ' + urunler.length + ' fiş ürünü.');
        } catch(err2) { alert('Geri yükleme sırasında hata oldu.'); }
        input.value = '';
    };
    reader.readAsText(input.files[0]);
}

/* ---------- Fotoğraf ---------- */
function resizeImage(file, cb) {
    var reader = new FileReader();
    reader.onload = function(ev) {
        var img = new Image();
        img.onload = function() {
            var max = 400, w = img.width, h = img.height;
            if (w > h) { if (w > max) { h = Math.round(h * max / w); w = max; } }
            else { if (h > max) { w = Math.round(w * max / h); h = max; } }
            var cv = document.createElement('canvas');
            cv.width = w; cv.height = h;
            cv.getContext('2d').drawImage(img, 0, 0, w, h);
            try { cb(cv.toDataURL('image/jpeg', 0.7)); } catch(e) { cb(ev.target.result); }
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
}
var _fotoHedef = -1;
function fotoGirisSec() {
    _fotoHedef = -2;
    var inp = document.getElementById('fotoInput'); inp.value = ''; inp.click();
}
function fotoTiklandi(i) {
    _fotoHedef = i;
    var inp = document.getElementById('fotoInput'); inp.value = ''; inp.click();
}
function fotoYuklendi(input) {
    if (!input.files || !input.files[0]) return;
    resizeImage(input.files[0], function(dataUrl) {
        if (_fotoHedef === -2) { _girisFoto = dataUrl; girisFotoGuncelle(); }
        else if (_fotoHedef >= 0 && _fotoHedef < urunler.length) { urunler[_fotoHedef].img = dataUrl; urunlerKaydet(); renderFis(); }
    });
}
function girisFotoGuncelle() {
    var w = document.getElementById('onFotoWrap');
    if (_girisFoto) w.innerHTML = '<img class="urun-foto" src="' + _girisFoto + '" onclick="fotoGirisSec()">';
    else w.innerHTML = '<button class="foto-ekle" onclick="fotoGirisSec()">📷</button>';
}
function fotoBuyutEl(el) {
    document.getElementById('fotoModalImg').src = el.src;
    document.getElementById('fotoModal').classList.add('acik');
}

/* ---------- Hesaplama ---------- */
function pf(id) { return parseFloat(document.getElementById(id).value) || 0; }
function getKurlar() {
    return { rnb: pf('rnb'), usd: pf('usd'), zNak: pf('zNak'), nNak: pf('nNak'), sNak: pf('sNak') };
}
function hesapla(gram, fiyat, gb, k) {
    gb = gb || 1;
    var g = gram / gb;
    var mZ = (fiyat * 1.05 * k.rnb) + (g * 1.1 * (k.zNak / 1000) * k.usd);
    var mN = (fiyat * 1.05 * k.rnb) + (g * 1.1 * (k.nNak / 1000) * k.usd);
    var mS = (fiyat * 1.05 * k.rnb) + (g * 1.1 * (k.sNak / 1000) * k.usd);
    var bZ = mZ * 2, bN = mN * 2, bS = mS * 2;
    return { bZ: bZ, bN: bN, bS: bS, ortGuclu: (bZ + bN + bS) / 3 };
}
function guncelGb() { return document.querySelector('input[name="gramTipi"]:checked').value == '12' ? 12 : 1; }
// Tedarikçiye ödenen Yuan = Σ(fiyat × adet)
function fisYuan(liste) {
    var t = 0;
    for (var i = 0; i < liste.length; i++) t += (liste[i].fiyat || 0) * (liste[i].adet || 0);
    return t;
}
// Yuan → USD ($ = ¥ × RMB kuru ÷ USD kuru)
function yuanUsd(yuan, k) { return yuan * (k.rnb || 0) / (k.usd || 1); }
function yuanUsdStr(yuan, k) {
    return '¥' + f(yuan) + '<span style="font-size:0.62em;color:#a5b4fc;font-weight:700;margin-left:4px">· $' + f(yuanUsd(yuan, k)) + '</span>';
}
// Fiş toplamı kutusu: normal + %5 dahil
function toplam5Rows(yuan, k, baslik) {
    var y5 = yuan * 1.05;
    return '<div class="r1"><span class="l1">' + baslik + '</span><span class="v1">¥' + f(yuan) + '<span class="usd" style="color:#a5b4fc">· $' + f(yuanUsd(yuan, k)) + '</span></span></div>' +
           '<div class="r2"><span class="l2">+ %5 dahil</span><span class="v2">¥' + f(y5) + '<span class="usd" style="color:#fde68a">· $' + f(yuanUsd(y5, k)) + '</span></span></div>';
}

function f(n) { return n.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ---------- Önizleme (canlı) ---------- */
function onGirisDegis() {
    var gram = parseFloat(document.getElementById('gramInput').value);
    var fiyat = parseFloat(document.getElementById('fiyatInput').value);
    var box = document.getElementById('onizleme');
    if (!gram || !fiyat) { box.style.display = 'none'; return; }
    var h = hesapla(gram, fiyat, guncelGb(), getKurlar());
    document.getElementById('onBirim').textContent = '₺' + f(h.ortGuclu);
    document.getElementById('onS').textContent = '₺' + f(h.bS);
    document.getElementById('onZ').textContent = '₺' + f(h.bZ);
    document.getElementById('onN').textContent = '₺' + f(h.bN);
    box.style.display = 'block';
}

/* ---------- Sipariş ver (sepete ekle) ---------- */
function siparisVer() {
    var gram = parseFloat(document.getElementById('gramInput').value);
    var fiyat = parseFloat(document.getElementById('fiyatInput').value);
    if (!gram || !fiyat) { alert('Gram ve fiyat girin.'); return; }
    var adet = parseInt(document.getElementById('onAdet').value) || 1;
    if (adet < 1) adet = 1;

    urunler.push({ gram: gram, fiyat: fiyat, adet: adet, gb: guncelGb(), img: _girisFoto });
    urunlerKaydet();

    document.getElementById('gramInput').value = '';
    document.getElementById('fiyatInput').value = '';
    document.getElementById('onAdet').value = '';
    _girisFoto = null;
    girisFotoGuncelle();
    document.getElementById('onizleme').style.display = 'none';
    document.getElementById('gramInput').focus();
    renderFis();
    tabRozetGuncelle();
}

/* ---------- Fiş (sepet) ürün kartı ---------- */
function urunKartHtml(u, i, k, editable) {
    var adet = u.adet || 0;
    var lineYuan = (u.fiyat || 0) * adet;
    var h = hesapla(u.gram, u.fiyat, u.gb || 1, k);
    var satisToplam = h.ortGuclu * adet;
    var s = '<div class="urun-item"><div class="urun-head">';
    if (u.img) s += '<img class="urun-foto" src="' + u.img + '" onclick="fotoBuyutEl(this)">';
    else if (editable) s += '<button class="foto-ekle" onclick="fotoTiklandi(' + i + ')">📷</button>';
    else s += '<div class="foto-ekle" style="cursor:default">🖼️</div>';
    s += '<div class="urun-badge">' + (i+1) + '</div>';
    s += '<div class="urun-info"><b>' + u.gram + 'g</b> · <b>' + u.fiyat + '¥</b></div>';
    if (editable) s += '<button class="btn-sil" onclick="sil(' + i + ')">✕</button>';
    s += '</div>';
    s += '<div class="kart-adet-row">';
    if (editable) {
        s += '<div class="kart-adet"><input type="number" inputmode="numeric" placeholder="Adet" value="' + (u.adet ? u.adet : '') + '" onchange="adetDegistir(' + i + ',this.value)"></div>';
    } else {
        s += '<div class="kart-adet" style="width:auto"><b style="color:#f1f5f9;font-size:15px">' + adet + ' adet</b></div>';
    }
    s += '<div class="toplam-kutu"><span class="lbl">Alış (¥×adet)</span><span class="val">' + (adet > 0 ? yuanUsdStr(lineYuan, k) : '—') + '</span></div>';
    s += '</div>';
    s += '<div class="satis-row"><span>Satış birim <b>₺' + f(h.ortGuclu) + '</b></span><span>' + (adet > 0 ? 'Toplam <b>₺' + f(satisToplam) + '</b>' : '') + '</span></div>';
    s += '</div>';
    return s;
}

function adetDegistir(i, val) {
    var a = parseInt(val) || 0;
    if (a < 0) a = 0;
    urunler[i].adet = a || null;
    urunlerKaydet();
    renderFis();
}
function sil(idx) {
    urunler.splice(idx, 1);
    urunlerKaydet();
    renderFis();
    tabRozetGuncelle();
}
function temizle() {
    if (!confirm('Fişteki ürünler silinsin mi? (Kayıtlı siparişler etkilenmez)')) return;
    urunler = [];
    urunlerKaydet();
    renderFis();
    tabRozetGuncelle();
}

/* ---------- Fiş render ---------- */
function renderFis() {
    var list = document.getElementById('fisUrunList');
    var k = getKurlar();
    if (urunler.length === 0) {
        list.innerHTML = '<div class="empty"><div class="ico">🧾</div><p>Fiş boş.<br><b>Ürün Ekle</b> sekmesinden sipariş ver.</p></div>';
        document.getElementById('fisToplamKutu').style.display = 'none';
        document.getElementById('fisActions').style.display = 'none';
    } else {
        var html = '';
        for (var i = 0; i < urunler.length; i++) html += urunKartHtml(urunler[i], i, k, true);
        list.innerHTML = html;
        document.getElementById('fisToplamKutu').innerHTML = toplam5Rows(fisYuan(urunler), k, '🧾 Fiş Toplamı');
        document.getElementById('fisToplamKutu').style.display = 'block';
        document.getElementById('fisActions').style.display = 'block';
    }
}

/* ---------- Fiş kaydet ---------- */
function fisKaydet() {
    if (urunler.length === 0) { alert('Fişte ürün yok.'); return; }
    var ad = prompt('Fiş adı (tedarikçi / dükkan):', '');
    if (ad === null) return;
    ad = (ad || '').trim();
    if (!ad) ad = 'Sipariş ' + (fisler.length + 1);
    var k = getKurlar();
    fisler.push({
        id: Date.now(),
        ad: ad,
        tarih: new Date().toLocaleDateString('tr-TR'),
        kurlar: k,
        urunler: urunler,
        toplam: fisYuan(urunler)
    });
    fislerKaydet();
    urunler = [];
    urunlerKaydet();
    renderFis();
    tabRozetGuncelle();
    alert('✅ Fiş kaydedildi: ' + ad + '\n\nYeni fişe başlayabilirsin.');
    tabGoster('siparisler');
}

/* ---------- Siparişler (fiş listesi) ---------- */
function fislerRender() {
    var el = document.getElementById('fislerList');
    if (fisler.length === 0) {
        el.innerHTML = '<div class="empty"><div class="ico">📋</div><p>Henüz kayıtlı sipariş yok.<br>Fiş sekmesinden kaydet.</p></div>';
        return;
    }
    var html = '';
    var gY = 0, gU = 0;
    for (var i = fisler.length - 1; i >= 0; i--) {
        var fs = fisler[i];
        var fy = fisYuan(fs.urunler);
        gY += fy; gU += yuanUsd(fy, fs.kurlar || {});
        html += '<div class="fis-card" onclick="fisAc(' + fs.id + ')">';
        html += '<div class="fis-ust"><span class="fis-ad">🧾 ' + escapeHtml(fs.ad) + '</span><span class="fis-tarih">' + fs.tarih + '</span></div>';
        html += '<div class="fis-alt"><span class="adet">' + fs.urunler.length + ' ürün</span><span class="fis-toplam">' + yuanUsdStr(fy, fs.kurlar || {}) + '</span></div>';
        html += '</div>';
    }
    html += '<div class="genel-toplam" style="display:flex;margin-top:6px"><span class="lbl">💰 Tüm Siparişler</span><span class="val">¥' + f(gY) + '<span style="font-size:0.62em;color:#a5b4fc;font-weight:700;margin-left:4px">· $' + f(gU) + '</span></span></div>';
    el.innerHTML = html;
}
function fisAc(id) {
    var fs = null;
    for (var i = 0; i < fisler.length; i++) if (fisler[i].id === id) fs = fisler[i];
    if (!fs) return;
    var k = fs.kurlar || getKurlar();
    var html = '';
    html += '<button class="btn-geri" onclick="fisGeri()">‹ Siparişler</button>';
    html += '<div class="fis-baslik"><h2>🧾 ' + escapeHtml(fs.ad) + '</h2><small>' + fs.tarih + ' · ' + fs.urunler.length + ' ürün</small></div>';
    for (var j = 0; j < fs.urunler.length; j++) html += urunKartHtml(fs.urunler[j], j, k, false);
    html += '<div class="toplam5">' + toplam5Rows(fisYuan(fs.urunler), k, '💰 Fiş Toplamı') + '</div>';
    html += '<button class="btn-fissil" onclick="fisSil(' + fs.id + ')">🗑️ Bu Fişi Sil</button>';
    document.getElementById('fisDetay').innerHTML = html;
    document.getElementById('fislerList').style.display = 'none';
    document.getElementById('fisDetay').style.display = 'block';
    window.scrollTo(0, 0);
}
function fisGeri() {
    document.getElementById('fisDetay').style.display = 'none';
    document.getElementById('fislerList').style.display = 'block';
    fislerRender();
}
function fisSil(id) {
    if (!confirm('Bu fiş tamamen silinsin mi?')) return;
    for (var i = 0; i < fisler.length; i++) { if (fisler[i].id === id) { fisler.splice(i, 1); break; } }
    fislerKaydet();
    tabRozetGuncelle();
    fisGeri();
}

/* ---------- Sekmeler ---------- */
function tabGoster(t) {
    document.getElementById('view-urun').style.display = (t === 'urun') ? 'block' : 'none';
    document.getElementById('view-fis').style.display = (t === 'fis') ? 'block' : 'none';
    document.getElementById('view-siparisler').style.display = (t === 'siparisler') ? 'block' : 'none';
    document.getElementById('tab-urun').classList.toggle('aktif', t === 'urun');
    document.getElementById('tab-fis').classList.toggle('aktif', t === 'fis');
    document.getElementById('tab-siparisler').classList.toggle('aktif', t === 'siparisler');
    if (t === 'fis') renderFis();
    if (t === 'siparisler') fisGeri();
    window.scrollTo(0, 0);
}
function tabRozetGuncelle() {
    document.getElementById('tabFisEt').innerHTML = 'Fiş' + (urunler.length ? '<span class="tab-rozet">' + urunler.length + '</span>' : '');
    document.getElementById('tabSiparisEt').innerHTML = 'Siparişler' + (fisler.length ? '<span class="tab-rozet">' + fisler.length + '</span>' : '');
}

renderFis();
tabRozetGuncelle();

document.getElementById('gramInput').addEventListener('input', onGirisDegis);
document.getElementById('fiyatInput').addEventListener('input', onGirisDegis);
document.querySelectorAll('input[name="gramTipi"]').forEach(function(r) { r.addEventListener('change', onGirisDegis); });
document.getElementById('gramInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('fiyatInput').focus();
});
document.getElementById('fiyatInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { var a = document.getElementById('onAdet'); if (document.getElementById('onizleme').style.display !== 'none') a.focus(); }
});
document.getElementById('onAdet').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') siparisVer();
});

// Çevrimdışı çalışma (service worker)
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
