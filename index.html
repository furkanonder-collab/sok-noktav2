<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Şok Nokta">
<meta name="theme-color" content="#0b1120">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230b1120' width='100' height='100' rx='20'/><text x='50' y='68' text-anchor='middle' font-size='52'>⚡</text></svg>">
<title>Şok Nokta - Maliyet</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b 0%, #0b1120 55%) fixed, #0b1120;
    color: #e2e8f0; min-height: 100vh; padding: 0 14px 90px;
}

/* Header */
.header { text-align: center; padding: 22px 0 14px; }
.logo { width: 46px; height: 46px; border-radius: 14px; background: linear-gradient(135deg,#3b82f6,#8b5cf6); display: inline-flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 8px 24px rgba(59,130,246,0.35); margin-bottom: 8px; }
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.header small { color: #64748b; font-size: 12px; }

/* Cards */
.card { background: rgba(30,41,59,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(148,163,184,0.1); border-radius: 18px; padding: 16px; margin-bottom: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.25); }
.card-title { font-size: 12px; color: #94a3b8; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }

/* Ayarlar (kur) toggle */
.ayar-toggle { text-align: center; margin: 2px 0 12px; }
.ayar-toggle button { background: rgba(148,163,184,0.1); border: 1px solid rgba(148,163,184,0.15); color: #94a3b8; font-size: 12.5px; cursor: pointer; padding: 7px 16px; border-radius: 999px; transition: all 0.2s; }
.ayar-toggle button:active { background: rgba(148,163,184,0.2); }

.kur-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.kur-grid.uc { grid-template-columns: 1fr 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; color: #64748b; font-weight: 600; padding-left: 2px; }
.field input {
    background: #0b1120; border: 1.5px solid #1e293b; border-radius: 12px; padding: 13px;
    color: #f1f5f9; font-size: 17px; text-align: center; width: 100%; -webkit-appearance: none;
    transition: border-color 0.2s, box-shadow 0.2s; font-weight: 600;
}
.field input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
.field input::placeholder { color: #475569; font-weight: 400; }

/* Tane / Düzine toggle */
.gram-toggle { display: flex; gap: 4px; background: #0b1120; padding: 4px; border-radius: 12px; border: 1.5px solid #1e293b; margin-bottom: 12px; }
.gram-toggle input { display: none; }
.gram-toggle label { flex: 1; text-align: center; padding: 10px; font-size: 14px; color: #94a3b8; border-radius: 9px; cursor: pointer; transition: all 0.2s; font-weight: 600; }
.gram-toggle input:checked + label { background: linear-gradient(135deg,#3b82f6,#6366f1); color: white; box-shadow: 0 4px 12px rgba(59,130,246,0.35); }

/* Ürün ekle row */
.urun-row { display: flex; gap: 10px; align-items: flex-end; }
.urun-row .field { flex: 1; }
.btn-ekle {
    background: linear-gradient(135deg,#3b82f6,#6366f1); border: none; color: white; border-radius: 12px;
    padding: 0; font-size: 26px; cursor: pointer; height: 50px; min-width: 54px; display: flex;
    align-items: center; justify-content: center; box-shadow: 0 6px 16px rgba(59,130,246,0.35); transition: transform 0.1s;
}
.btn-ekle:active { transform: scale(0.94); }

/* Ürün listesi */
.urun-list { margin-top: 4px; }
.urun-item { background: rgba(15,23,42,0.85); border: 1px solid rgba(148,163,184,0.08); border-radius: 16px; padding: 14px; margin-bottom: 12px; position: relative; animation: slideIn 0.25s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.urun-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.urun-badge { background: linear-gradient(135deg,#3b82f6,#6366f1); color: white; font-size: 12px; font-weight: 700; width: 26px; height: 26px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.urun-info { font-size: 14px; color: #cbd5e1; }
.urun-info b { color: #f1f5f9; font-weight: 700; }
.btn-sil { margin-left: auto; background: rgba(239,68,68,0.12); border: none; color: #f87171; font-size: 15px; cursor: pointer; width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
.btn-sil:active { background: rgba(239,68,68,0.28); }

/* Ana sonuç (Ort.) */
.main-result { background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.12)); border: 1px solid rgba(99,102,241,0.25); border-radius: 14px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.main-result .lbl { font-size: 12px; color: #a5b4fc; font-weight: 600; }
.main-result .val { font-size: 24px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }

/* Alt kırılım (Z/N/S) */
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.box { background: rgba(51,65,85,0.5); border-radius: 12px; padding: 9px 4px; text-align: center; }
.box .lbl { font-size: 10px; color: #94a3b8; font-weight: 600; margin-bottom: 2px; }
.box .val { font-size: 14px; font-weight: 700; }
.c-z { color: #fbbf24; }
.c-n { color: #a78bfa; }
.c-s { color: #34d399; }

/* Boş durum */
.empty { text-align: center; padding: 40px 20px; color: #475569; }
.empty .ico { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }
.empty p { font-size: 13px; line-height: 1.5; }

/* Özet + temizle */
.ozet { text-align: center; margin: 4px 0 12px; }
.ozet span { font-size: 12px; color: #64748b; }
.ozet b { color: #94a3b8; }
.btn-temizle { width: 100%; background: rgba(153,27,27,0.15); border: 1px solid rgba(239,68,68,0.2); color: #f87171; border-radius: 12px; padding: 12px; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.btn-temizle:active { background: rgba(153,27,27,0.3); }
</style>
</head>
<body>

<div class="header">
    <div class="logo">⚡</div>
    <h1>Şok Nokta</h1>
    <small>Hızlı maliyet hesaplayıcı</small>
</div>

<div class="ayar-toggle">
    <button onclick="toggleKur()">⚙️ Kur & Nakliye Ayarları</button>
</div>

<div class="card" id="kurCard" style="display:none">
    <div class="card-title">💱 Döviz Kurları</div>
    <div class="kur-grid">
        <div class="field"><label>RMB Kuru</label><input type="number" id="rnb" value="6.60" step="0.01" inputmode="decimal" onchange="kurKaydet()"></div>
        <div class="field"><label>USD Kuru</label><input type="number" id="usd" value="45.00" step="0.01" inputmode="decimal" onchange="kurKaydet()"></div>
    </div>
    <div class="card-title" style="margin-top:16px">🚚 Nakliye ($/ton)</div>
    <div class="kur-grid uc">
        <div class="field"><label>Z</label><input type="number" id="zNak" value="52" step="0.5" inputmode="decimal" onchange="kurKaydet()"></div>
        <div class="field"><label>N</label><input type="number" id="nNak" value="42" step="0.5" inputmode="decimal" onchange="kurKaydet()"></div>
        <div class="field"><label>S</label><input type="number" id="sNak" value="48" step="0.5" inputmode="decimal" onchange="kurKaydet()"></div>
    </div>
</div>

<div class="card">
    <div class="card-title">➕ Ürün Ekle</div>
    <div class="gram-toggle">
        <input type="radio" name="gramTipi" id="gramTane" value="1" checked>
        <label for="gramTane">Tane</label>
        <input type="radio" name="gramTipi" id="gramDuzine" value="12">
        <label for="gramDuzine">Düzine</label>
    </div>
    <div class="urun-row">
        <div class="field"><label>Gram</label><input type="number" id="gramInput" inputmode="decimal" placeholder="250"></div>
        <div class="field"><label>Fiyat (¥)</label><input type="number" id="fiyatInput" inputmode="decimal" placeholder="12.5"></div>
        <button class="btn-ekle" onclick="ekle()">+</button>
    </div>
</div>

<div id="urunList" class="urun-list"></div>

<div class="ozet" id="ozet" style="display:none">
    <span>Toplam <b id="ozetAdet">0</b> ürün</span>
</div>

<div id="actionsBar" style="display:none">
    <button class="btn-temizle" onclick="temizle()">🗑️ Tümünü Temizle</button>
</div>

<script>
var urunler = [];

var _kurFields = ['rnb','usd','zNak','nNak','sNak'];
function kurKaydet() {
    var obj = {};
    for (var i = 0; i < _kurFields.length; i++) obj[_kurFields[i]] = document.getElementById(_kurFields[i]).value;
    localStorage.setItem('smh_kurlar', JSON.stringify(obj));
    render();
}
function kurYukle() {
    try {
        var obj = JSON.parse(localStorage.getItem('smh_kurlar'));
        if (!obj) return;
        for (var i = 0; i < _kurFields.length; i++) {
            if (obj[_kurFields[i]] !== undefined) document.getElementById(_kurFields[i]).value = obj[_kurFields[i]];
        }
    } catch(e) {}
}
kurYukle();

function toggleKur() {
    var c = document.getElementById('kurCard');
    c.style.display = c.style.display === 'none' ? 'block' : 'none';
}

function hesapla(gram, fiyat) {
    var rnb = parseFloat(document.getElementById('rnb').value) || 0;
    var usd = parseFloat(document.getElementById('usd').value) || 0;
    var zN = parseFloat(document.getElementById('zNak').value) || 0;
    var nN = parseFloat(document.getElementById('nNak').value) || 0;
    var sN = parseFloat(document.getElementById('sNak').value) || 0;

    var gramBolen = document.querySelector('input[name="gramTipi"]:checked').value == '12' ? 12 : 1;
    var g = gram / gramBolen;
    var mZ = (fiyat * 1.05 * rnb) + (g * 1.1 * (zN / 1000) * usd);
    var mN = (fiyat * 1.05 * rnb) + (g * 1.1 * (nN / 1000) * usd);
    var mS = (fiyat * 1.05 * rnb) + (g * 1.1 * (sN / 1000) * usd);

    var bZ = mZ * 2;
    var bN = mN * 2;
    var bS = mS * 2;
    var ortGuclu = (bZ + bN + bS) / 3;

    return { bZ: bZ, bN: bN, bS: bS, ortGuclu: ortGuclu };
}

function ekle() {
    var gram = parseFloat(document.getElementById('gramInput').value);
    var fiyat = parseFloat(document.getElementById('fiyatInput').value);
    if (!gram || !fiyat) { alert('Gram ve fiyat girin.'); return; }

    urunler.push({ gram: gram, fiyat: fiyat });
    document.getElementById('gramInput').value = '';
    document.getElementById('fiyatInput').value = '';
    document.getElementById('gramInput').focus();
    render();
}

function sil(idx) {
    urunler.splice(idx, 1);
    render();
}

function temizle() {
    if (!confirm('Tüm ürünler silinsin mi?')) return;
    urunler = [];
    render();
}

function f(n) { return n.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

function render() {
    var list = document.getElementById('urunList');
    if (urunler.length === 0) {
        list.innerHTML = '<div class="empty"><div class="ico">📦</div><p>Henüz ürün eklenmedi.<br>Gram ve fiyat girip <b>+</b> butonuna bas.</p></div>';
        document.getElementById('ozet').style.display = 'none';
        document.getElementById('actionsBar').style.display = 'none';
        return;
    }
    var html = '';
    for (var i = 0; i < urunler.length; i++) {
        var u = urunler[i];
        var h = hesapla(u.gram, u.fiyat);
        html += '<div class="urun-item">';
        html += '<div class="urun-head">';
        html += '<div class="urun-badge">' + (i+1) + '</div>';
        html += '<div class="urun-info"><b>' + u.gram + 'g</b> · <b>' + u.fiyat + ' ¥</b></div>';
        html += '<button class="btn-sil" onclick="sil('+i+')">✕</button>';
        html += '</div>';

        html += '<div class="main-result"><span class="lbl">Ort. Fiyat</span><span class="val">₺' + f(h.ortGuclu) + '</span></div>';

        html += '<div class="row3">';
        html += '<div class="box"><div class="lbl">S</div><div class="val c-s">₺' + f(h.bS) + '</div></div>';
        html += '<div class="box"><div class="lbl">Z</div><div class="val c-z">₺' + f(h.bZ) + '</div></div>';
        html += '<div class="box"><div class="lbl">N</div><div class="val c-n">₺' + f(h.bN) + '</div></div>';
        html += '</div>';

        html += '</div>';
    }
    list.innerHTML = html;

    document.getElementById('ozet').style.display = 'block';
    document.getElementById('actionsBar').style.display = 'block';
    document.getElementById('ozetAdet').textContent = urunler.length;
}
render();

document.getElementById('fiyatInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') ekle();
});
document.querySelectorAll('input[name="gramTipi"]').forEach(function(r) { r.addEventListener('change', render); });
document.getElementById('gramInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('fiyatInput').focus();
});
</script>
</body>
</html>
